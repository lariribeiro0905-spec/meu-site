<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Formulário</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">

<h2>Cadastro</h2>

<form>
    <div class="mb-3">
        <label>Nome</label>
        <input type="text" class="form-control">
    </div>

    <div class="mb-3">
        <label>Email</label>
        <input type="email" class="form-control">
    </div>

    <h3>💼 Experiência Profissional</h3>

    <div id="experiencias">
        <div class="experiencia-item">
            <div class="mb-3">
                <label>Empresa</label>
                <input type="text" class="form-control">
            </div>

            <div class="mb-3">
                <label>Cargo</label>
                <input type="text" class="form-control">
            </div>

            <div class="mb-3">
                <label>Período</label>
                <input type="text" class="form-control">
            </div>

            <div class="mb-3">
                <label>Descrição</label>
                <textarea class="form-control"></textarea>
            </div>

            <hr>
        </div>
    </div>

    <button type="button" class="btn btn-secondary mb-3" onclick="adicionarExperiencia()">
        + Adicionar experiência
    </button>

    <br>

    <button type="submit" class="btn btn-primary">Enviar</button>
</form>

<script>
function adicionarExperiencia() {
    const container = document.getElementById("experiencias");

    const nova = document.createElement("div");
    nova.innerHTML = `
        <div class="mb-3">
            <label>Empresa</label>
            <input type="text" class="form-control">
        </div>

        <div class="mb-3">
            <label>Cargo</label>
            <input type="text" class="form-control">
        </div>

        <div class="mb-3">
            <label>Período</label>
            <input type="text" class="form-control">
        </div>

        <div class="mb-3">
            <label>Descrição</label>
            <textarea class="form-control"></textarea>
        </div>

        <button type="button" class="btn btn-danger mb-3" onclick="this.parentElement.remove()">
            Remover
        </button>

        <hr>
    `;

    container.appendChild(nova);
}
</script>

</body>
</html>
